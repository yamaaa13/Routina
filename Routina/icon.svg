<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1E"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#C084FC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Timer ring -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="rgba(51,65,85,0.4)" stroke-width="16"/>
  <circle cx="256" cy="240" r="120" fill="none" stroke="url(#ring)" stroke-width="16" stroke-linecap="round"
    stroke-dasharray="754" stroke-dashoffset="188" transform="rotate(-90 256 240)"/>
  <!-- Play triangle -->
  <path d="M236 200 L236 280 L296 240 Z" fill="url(#accent)" opacity="0.9"/>
  <!-- R letter -->
  <text x="256" y="440" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="60" font-weight="800" fill="url(#ring)">R</text>
</svg>
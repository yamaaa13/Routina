<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0F1E">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Routina</title>
<style>
  :root {
    --bg: #0A0F1E;
    --bg2: #111827;
    --card: rgba(30, 41, 59, 0.65);
    --card-solid: #1E293B;
    --accent: #6366F1;
    --accent-light: #818CF8;
    --accent-dim: #4F46E5;
    --green: #34D399;
    --green-dim: #059669;
    --red: #F87171;
    --orange: #FBBF24;
    --text: #F1F5F9;
    --text-dim: #94A3B8;
    --text-muted: #64748B;
    --border: rgba(99, 102, 241, 0.15);
    --border-subtle: rgba(51, 65, 85, 0.5);
    --line-green: #06C755;
    --glow-accent: rgba(99, 102, 241, 0.25);
    --glow-green: rgba(52, 211, 153, 0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 440px; margin: 0 auto; min-height: 100vh;
    min-height: 100dvh; overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 600px 400px at 50% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 80% 60%, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
  }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  input::placeholder { color: var(--text-muted); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.75} }
  @keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes glowPulse { 0%,100%{box-shadow:0 0 15px var(--glow-accent)} 50%{box-shadow:0 0 30px var(--glow-accent), 0 0 60px rgba(99,102,241,0.1)} }

  .header {
    padding: 20px 20px 0; display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 {
    font-size: 22px; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(135deg, #818CF8, #C084FC, #818CF8);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }
  .header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.5px; }

  .content { padding: 16px 20px 110px; }

  /* Timer */
  .timer-modes { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .timer-mode-btn {
    padding: 7px 18px; border-radius: 20px; border: 1px solid var(--border-subtle);
    background: var(--card); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: var(--text-dim); font-size: 13px; font-weight: 600; transition: all .2s;
  }
  .timer-mode-btn.active-work {
    background: linear-gradient(135deg, var(--accent), #7C3AED); color: #fff;
    border-color: transparent; box-shadow: 0 2px 12px var(--glow-accent);
  }
  .timer-mode-btn.active-break {
    background: linear-gradient(135deg, var(--green-dim), #10B981); color: #fff;
    border-color: transparent; box-shadow: 0 2px 12px var(--glow-green);
  }
  .timer-mode-btn.active-custom {
    background: linear-gradient(135deg, #D946EF, #A855F7); color: #fff;
    border-color: transparent; box-shadow: 0 2px 12px rgba(217, 70, 239, 0.25);
  }
  .custom-settings {
    background: var(--card); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
    border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .custom-settings-title { font-size: 12px; color: var(--text-dim); font-weight: 600; margin-bottom: 10px; }
  .custom-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .custom-row:last-child { margin-bottom: 0; }
  .custom-row label { font-size: 13px; color: var(--text-muted); width: 60px; flex-shrink: 0; }
  .custom-slider {
    -webkit-appearance: none; appearance: none; flex: 1; height: 4px;
    border-radius: 2px; background: var(--border); outline: none;
  }
  .custom-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: linear-gradient(135deg, #D946EF, #A855F7);
    cursor: pointer; box-shadow: 0 0 8px rgba(217, 70, 239, 0.35);
  }
  .custom-slider-val { font-size: 13px; color: var(--text); font-weight: 700; min-width: 40px; text-align: right; }

  /* Priority badges */
  .priority-tag {
    display: inline-block; font-size: 10px; padding: 3px 8px; border-radius: 10px;
    font-weight: 700; margin-left: 6px;
  }
  .priority-1 { background: rgba(248,113,113,0.2); color: #F87171; border: 1px solid rgba(248,113,113,0.3); }
  .priority-2 { background: rgba(251,146,60,0.2); color: #FB923C; border: 1px solid rgba(251,146,60,0.3); }
  .priority-3 { background: rgba(99,102,241,0.2); color: #818CF8; border: 1px solid rgba(99,102,241,0.3); }
  .priority-4 { background: rgba(100,116,139,0.2); color: #94A3B8; border: 1px solid rgba(100,116,139,0.3); }

  .timer-ring-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
  .timer-ring { position: relative; filter: drop-shadow(0 0 20px var(--glow-accent)); }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring .ring-bg { fill: none; stroke: rgba(51, 65, 85, 0.4); }
  .timer-ring .ring-progress { fill: none; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
  .timer-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .timer-label { font-size: 13px; font-weight: 700; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
  .timer-digits { font-size: 48px; font-weight: 800; letter-spacing: 3px; font-variant-numeric: tabular-nums; }
  .timer-sessions { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .timer-controls { display: flex; gap: 16px; align-items: center; justify-content: center; }
  .btn-reset {
    width: 46px; height: 46px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: var(--text-dim); display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .btn-reset:hover { border-color: var(--text-muted); }
  .btn-play {
    width: 68px; height: 68px; border-radius: 50%; border: none;
    color: #fff; display: flex; align-items: center; justify-content: center;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
  }
  .btn-play:active { transform: scale(0.92); }
  .btn-play.work {
    background: linear-gradient(135deg, var(--accent), #7C3AED);
    box-shadow: 0 4px 24px var(--glow-accent);
    animation: glowPulse 3s ease infinite;
  }
  .btn-play.break {
    background: linear-gradient(135deg, #059669, #10B981);
    box-shadow: 0 4px 24px var(--glow-green);
  }
  .btn-play.paused {
    background: linear-gradient(135deg, #DC2626, var(--red));
    box-shadow: 0 4px 24px rgba(248, 113, 113, 0.25);
    animation: none;
  }

  .pomo-count {
    text-align: center; padding: 14px; background: var(--card);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-radius: 14px; border: 1px solid var(--border);
    color: var(--text-dim); font-size: 13px; margin-top: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .pomo-count span { color: var(--accent-light); font-weight: 700; }

  /* Active task banner */
  .active-task-banner {
    background: rgba(99, 102, 241, 0.12); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(99, 102, 241, 0.25); border-radius: 14px;
    padding: 10px 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 12px rgba(99, 102, 241, 0.15);
    animation: slideUp .3s ease;
  }
  .abt-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: var(--accent-light); box-shadow: 0 0 6px var(--glow-accent);
    animation: pulse 2s infinite;
  }
  .abt-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .abt-title { font-size: 13px; font-weight: 600; color: var(--text); }

  /* Tasks */
  .task-card {
    background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 18px; overflow: hidden;
    border: 1px solid var(--border); margin-bottom: 12px;
    transition: all .3s; box-shadow: 0 2px 16px rgba(0,0,0,0.15);
  }
  .task-card.complete { border-color: var(--green-dim); box-shadow: 0 2px 16px var(--glow-green); }
  .task-header {
    padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
  }
  .chevron { transition: transform .2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(90deg); }
  .task-title { font-size: 15px; font-weight: 600; }
  .task-title.done { color: var(--green); text-decoration: line-through; }
  .routine-tag {
    display: inline-block; font-size: 10px; padding: 3px 10px; border-radius: 10px;
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
    color: var(--accent-light); margin-left: 8px; font-weight: 600;
    border: 1px solid rgba(99,102,241,0.15);
  }
  .task-progress-bar {
    margin-top: 6px; height: 3px; border-radius: 2px;
    background: rgba(51, 65, 85, 0.4); overflow: hidden;
  }
  .task-progress-fill { height: 100%; border-radius: 2px; transition: width .3s ease; }
  .task-progress-fill.normal { background: linear-gradient(90deg, var(--accent), #8B5CF6); }
  .task-progress-fill.done { background: linear-gradient(90deg, var(--green-dim), var(--green)); }
  .task-count { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }

  .btn-task-play {
    width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--card); color: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .2s;
  }
  .btn-task-play.active-task { background: var(--accent); border-color: transparent; color: #fff; box-shadow: 0 0 8px var(--glow-accent); }

  .task-body { padding: 0 16px 14px; }
  .subtask {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-top: 1px solid #33415520; cursor: pointer;
  }
  .checkbox {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
    border: 2px solid var(--text-muted); display: flex;
    align-items: center; justify-content: center;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
  }
  .checkbox.checked {
    border-color: var(--green);
    background: linear-gradient(135deg, var(--green-dim), var(--green));
    box-shadow: 0 0 8px var(--glow-green);
  }
  .subtask-text { font-size: 14px; transition: all .2s; }
  .subtask-text.done { color: var(--text-muted); text-decoration: line-through; }

  .subtask-input {
    width: 100%; padding: 8px 12px; border-radius: 10px; font-size: 13px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); outline: none; margin-top: 8px;
  }

  .btn-task-timer-full {
    width: 100%; margin-top: 10px; padding: 10px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), #7C3AED); color: #fff;
    font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;
    box-shadow: 0 2px 10px var(--glow-accent); transition: all .2s;
  }
  .btn-task-timer-full:active { transform: scale(0.98); }

  .task-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
  .btn-share {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #06C755, #00B548); color: #fff;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 2px 16px rgba(6, 199, 85, 0.3); transition: all .2s;
  }
  .btn-share:active { transform: scale(0.95); }
  .btn-delete {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-size: 13px;
  }

  .btn-add-task {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px; border-radius: 16px; width: 100%;
    border: 1px dashed var(--border); background: transparent;
    color: var(--text-muted); font-size: 14px;
  }

  /* Add task step modal */
  .add-task-modal {
    background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 20px; padding: 20px; border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3); animation: slideUp .3s ease;
  }
  .add-task-modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
  .add-task-modal p { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.5; }
  .add-task-input {
    width: 100%; padding: 10px 14px; border-radius: 10px; font-size: 14px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); outline: none;
  }
  .step-btns { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn-step {
    flex: 1; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card); color: var(--text-dim); font-size: 13px; font-weight: 600;
    transition: all .2s; min-width: 100px;
  }
  .btn-step.urgent { border-color: rgba(248,113,113,0.4); color: #F87171; background: rgba(248,113,113,0.08); }
  .btn-step.important { border-color: rgba(99,102,241,0.4); color: var(--accent-light); background: rgba(99,102,241,0.08); }
  .btn-cancel-step {
    width: 100%; margin-top: 8px; padding: 8px; border-radius: 10px;
    border: 1px solid var(--border-subtle); background: transparent;
    color: var(--text-muted); font-size: 12px;
  }
  .result-badge {
    text-align: center; padding: 16px; border-radius: 14px; margin-bottom: 14px;
    background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2);
  }
  .result-badge .prio-num { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
  .result-badge .prio-label { font-size: 14px; color: var(--text-dim); }
  .btn-confirm-add {
    width: 100%; padding: 12px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), #7C3AED); color: #fff;
    font-size: 14px; font-weight: 700; box-shadow: 0 2px 10px var(--glow-accent);
  }
  .btn-step-next {
    width: 100%; margin-top: 10px; padding: 10px 16px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), #7C3AED); color: #fff;
    font-size: 13px; font-weight: 600; box-shadow: 0 2px 10px var(--glow-accent);
  }

  /* Overlay sheets */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    z-index: 80; display: flex; align-items: flex-end;
    animation: fadeIn .2s ease;
  }
  .sheet {
    width: 100%; max-width: 440px; margin: 0 auto;
    background: var(--bg2); border-radius: 24px 24px 0 0;
    padding: 20px 20px max(24px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    max-height: 80vh; overflow-y: auto;
    animation: slideUp .3s ease;
  }
  .sheet h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; text-align: center; color: var(--text); }
  .sheet-btns { display: flex; gap: 8px; }
  .btn-sheet-secondary {
    flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); font-size: 14px; font-weight: 600;
  }
  .btn-sheet-primary {
    flex: 1; padding: 12px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), #7C3AED); color: #fff;
    font-size: 14px; font-weight: 700; box-shadow: 0 2px 10px var(--glow-accent);
  }

  /* Task picker */
  .picker-task-card {
    background: var(--card); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
    border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 10px;
    transition: all .2s;
  }
  .picker-task-card:active { border-color: var(--accent); }
  .picker-task-card.active-pick { border-color: var(--accent); background: rgba(99,102,241,0.1); }
  .picker-task-info { flex: 1; }
  .picker-task-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .picker-task-sub { font-size: 11px; color: var(--text-muted); }
  .btn-picker-add {
    width: 100%; padding: 12px; border-radius: 12px; margin-top: 8px;
    border: 1px dashed var(--border); background: transparent;
    color: var(--text-muted); font-size: 13px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  /* Complete modal */
  .complete-modal-content { text-align: center; }
  .complete-task-name { font-size: 18px; font-weight: 700; color: var(--accent-light); margin: 12px 0; }
  .complete-modal-content p { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 440px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 max(20px, env(safe-area-inset-bottom)); z-index: 50;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 0; background: transparent; border: none;
    color: var(--text-muted); font-size: 11px; font-weight: 600; transition: all .2s;
  }
  .nav-btn.active { color: var(--accent-light); filter: drop-shadow(0 0 6px var(--glow-accent)); }

  .tab-content { animation: slideUp .3s ease; }

  /* Real-time clock */
  .clock-bar { text-align: center; padding: 14px 20px 0; }
  .clock-time {
    font-size: 44px; font-weight: 800; letter-spacing: 3px; font-variant-numeric: tabular-nums;
    background: linear-gradient(180deg, #F1F5F9 30%, #94A3B8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .clock-date { font-size: 14px; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.5px; }

  /* Audio Controls */
  .audio-panel {
    background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 18px; padding: 16px 18px;
    border: 1px solid var(--border); margin-top: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.15);
  }
  .audio-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .audio-panel-header span { font-size: 13px; font-weight: 600; color: var(--text-dim); }
  .bgm-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .bgm-btn {
    padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 600; transition: all .2s;
  }
  .bgm-btn.active {
    background: linear-gradient(135deg, var(--accent), #7C3AED);
    border-color: transparent; color: #fff; box-shadow: 0 2px 10px var(--glow-accent);
  }
  .bgm-btn.off-active { background: var(--card); border-color: var(--text-muted); color: var(--text); }
  .volume-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .volume-row label { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .volume-slider {
    -webkit-appearance: none; appearance: none; flex: 1; height: 4px;
    border-radius: 2px; background: var(--border); outline: none;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: linear-gradient(135deg, var(--accent-light), var(--accent));
    cursor: pointer; box-shadow: 0 0 8px var(--glow-accent);
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ========== Constants ==========
const WORK_TIME = 25 * 60, SHORT_BREAK = 5 * 60, LONG_BREAK = 15 * 60;
const PRIO_LABELS = { 1: '今すぐやる', 2: '今日中にやる', 3: '時間をとってやる', 4: '気が向いたらやる' };
const PRIO_COLORS = { 1: '#F87171', 2: '#FB923C', 3: '#818CF8', 4: '#94A3B8' };

// ========== State ==========
let state = {
  tab: 'timer',
  // timer
  timerMode: 'work', timeLeft: WORK_TIME, running: false, sessions: 0, pomoCount: 0,
  // tasks
  tasks: loadTasks(),
  // add task step flow: 0=hidden, 1=name, 2=q1(urgent), 3=q2(important), 4=result
  addStep: 0, newTaskTitle: '',
  addTaskUrgent: null, addTaskImportant: null,
  newSubtasks: {},
  // custom timer
  customWork: clampToStep(loadCustomTimer('work', 30), 15, 120, 15),
  customBreak: clampToStep(loadCustomTimer('break', 10), 5, 60, 5),
  // task-timer link
  activeTaskId: null, showTaskPicker: false, timerFromPicker: false,
  // complete modal
  showCompleteModal: false,
  // praise popup
  showPraiseModal: false, praiseMessage: '',
  // audio
  bgmPattern: loadBgmPattern(),
  bgmVolume: 0.3,
};

let timerInterval = null;
let audioCtx = null;
let bgmAudio = null;
const FADE_DURATION = 3;

const BGM_PATTERNS = [
  { id: 'off', name: 'OFF', file: null },
  { id: 'bgm1', name: 'BGM 1', file: 'bgm1.mp3' },
  { id: 'bgm2', name: 'BGM 2', file: 'bgm2.mp3' },
  { id: 'bgm3', name: 'BGM 3', file: 'bgm3.mp3' },
];

// ========== Helpers ==========
function clampToStep(val, min, max, step) {
  val = Math.round(val / step) * step;
  return Math.max(min, Math.min(max, val));
}

function migratePriority(p) {
  if (p === 'high') return 1;
  if (p === 'mid') return 2;
  if (p === 'low') return 3;
  if (typeof p === 'number' && p >= 1 && p <= 4) return p;
  return 4;
}

function calcPriority(urgent, important) {
  if (urgent && important) return 1;
  if (urgent && !important) return 2;
  if (!urgent && important) return 3;
  return 4;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== Storage ==========
function loadBgmPattern() {
  try { return localStorage.getItem('rt_bgm') || 'off'; } catch(e) { return 'off'; }
}
function saveBgmPattern() {
  try { localStorage.setItem('rt_bgm', state.bgmPattern); } catch(e) {}
}
function loadCustomTimer(type, def) {
  try { return parseInt(localStorage.getItem('rt_custom_' + type)) || def; } catch(e) { return def; }
}
function saveCustomTimer() {
  try {
    localStorage.setItem('rt_custom_work', state.customWork);
    localStorage.setItem('rt_custom_break', state.customBreak);
  } catch(e) {}
}
function loadTasks() {
  try {
    var t = JSON.parse(localStorage.getItem('rt_tasks'));
    if (t && t.length) {
      return t.map(function(task) {
        return Object.assign({}, task, { priority: migratePriority(task.priority) });
      });
    }
  } catch(e) {}
  return [
    { id: 1, title: '朝のルーティン', routine: true, open: true, priority: 1, subs: [
      { id: 101, text: '水を飲む', done: false },
      { id: 102, text: 'ストレッチ 5分', done: false },
      { id: 103, text: '今日のタスクを確認', done: false },
    ]},
    { id: 2, title: '企画書を仕上げる', routine: false, open: false, priority: 2, subs: [
      { id: 201, text: '構成を見直す', done: false },
      { id: 202, text: 'データを更新', done: false },
      { id: 203, text: '最終チェック', done: false },
    ]},
  ];
}
function saveTasks() {
  try { localStorage.setItem('rt_tasks', JSON.stringify(state.tasks)); } catch(e) {}
}

// ========== Timer helpers ==========
function getCustomWorkTime() { return state.customWork * 60; }
function getCustomBreakTime() { return state.customBreak * 60; }
function getTimerTotal() {
  if (state.timerMode === 'work') return WORK_TIME;
  if (state.timerMode === 'short') return SHORT_BREAK;
  if (state.timerMode === 'long') return LONG_BREAK;
  if (state.timerMode === 'custom_work') return getCustomWorkTime();
  if (state.timerMode === 'custom_break') return getCustomBreakTime();
  return WORK_TIME;
}
function isCustomMode() { return state.timerMode === 'custom_work' || state.timerMode === 'custom_break'; }
function isWorkMode() { return state.timerMode === 'work' || state.timerMode === 'custom_work'; }

// ========== Audio ==========
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function stopBgm() {
  if (bgmAudio) {
    var audio = bgmAudio;
    var startVol = audio.volume;
    var fadeSteps = 30;
    var fadeInterval = (FADE_DURATION * 1000) / fadeSteps;
    var step = 0;
    var fade = setInterval(function() {
      step++;
      audio.volume = Math.max(0, startVol * (1 - step / fadeSteps));
      if (step >= fadeSteps) {
        clearInterval(fade);
        audio.pause();
        audio.currentTime = 0;
      }
    }, fadeInterval);
    bgmAudio = null;
  }
}

function startBgm() {
  if (bgmAudio) { bgmAudio.pause(); bgmAudio.currentTime = 0; bgmAudio = null; }
  if (state.bgmPattern === 'off') return;
  var pattern = BGM_PATTERNS.find(function(p) { return p.id === state.bgmPattern; });
  if (!pattern || !pattern.file) return;
  var audio = new Audio(pattern.file);
  audio.volume = 0; audio.loop = false;
  bgmAudio = audio;
  audio.addEventListener('timeupdate', function() {
    if (!audio.duration) return;
    var tl = audio.duration - audio.currentTime;
    if (tl <= FADE_DURATION && tl > 0) audio.volume = Math.max(0, (tl / FADE_DURATION) * state.bgmVolume);
  });
  audio.addEventListener('ended', function() {
    if (bgmAudio === audio && state.running) {
      audio.currentTime = 0; audio.volume = 0;
      audio.play().catch(function() {});
      fadeInBgm(audio);
    }
  });
  audio.play().then(function() { fadeInBgm(audio); }).catch(function() {});
}

function fadeInBgm(audio) {
  var targetVol = state.bgmVolume;
  var fadeSteps = 30;
  var fadeInterval = (FADE_DURATION * 1000) / fadeSteps;
  var step = 0;
  var fade = setInterval(function() {
    step++;
    if (audio !== bgmAudio) { clearInterval(fade); return; }
    audio.volume = Math.min(targetVol, targetVol * (step / fadeSteps));
    if (step >= fadeSteps) clearInterval(fade);
  }, fadeInterval);
}

function updateBgmVolume() {
  if (bgmAudio && bgmAudio.duration) {
    var tl = bgmAudio.duration - bgmAudio.currentTime;
    if (tl > FADE_DURATION) bgmAudio.volume = state.bgmVolume;
  }
}

function playAlarm(type) {
  var ctx = getAudioCtx();
  var t = ctx.currentTime;
  if (type === 'work_end') {
    [523.3, 659.3, 784.0].forEach(function(freq, i) {
      var o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.3, t + i * 0.15);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.8);
      o.connect(g).connect(ctx.destination);
      o.start(t + i * 0.15); o.stop(t + i * 0.15 + 0.8);
    });
  } else if (type === 'break_end') {
    [392.0, 440.0, 523.3, 659.3].forEach(function(freq, i) {
      var o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.25, t + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.5);
      o.connect(g).connect(ctx.destination);
      o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.5);
    });
  }
}

// ========== Render ==========
function render() {
  var app = document.getElementById('app');
  app.innerHTML =
    renderHeader() +
    '<div class="content">' +
      (state.tab === 'timer' ? renderTimer() + renderTasks() : renderTasks()) +
    '</div>' +
    renderBottomNav() +
    (state.showTaskPicker ? renderTaskPickerOverlay() : '') +
    (state.showCompleteModal ? renderCompleteModal() : '') +
    (state.showPraiseModal ? renderPraiseModal() : '');
  bindEvents();
}

function renderHeader() {
  var now = new Date();
  var timeStr = now.toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  var dateStr = now.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  return '<div class="header"><div><h1>Routina</h1><p>あなたのリズムをつくる</p></div></div>' +
    '<div class="clock-bar">' +
    '<div class="clock-time" id="realtime-clock">' + timeStr + '</div>' +
    '<div class="clock-date" id="realtime-date">' + dateStr + '</div>' +
    '</div>';
}

function renderActiveTaskBanner() {
  if (!state.activeTaskId) return '';
  var task = state.tasks.find(function(t) { return t.id === state.activeTaskId; });
  if (!task) return '';
  var doneCount = task.subs.filter(function(s) { return s.done; }).length;
  var total = task.subs.length;
  var progStr = total > 0 ? ' (' + doneCount + '/' + total + ')' : '';
  return '<div class="active-task-banner">' +
    '<div class="abt-dot"></div>' +
    '<div><div class="abt-label">いまやっているタスク</div>' +
    '<div class="abt-title">' + esc(task.title) + progStr + '</div></div>' +
    '</div>';
}

function renderTimer() {
  var totalTime = getTimerTotal();
  var progress = 1 - state.timeLeft / totalTime;
  var size = 220, sw = 8;
  var r = (size - sw) / 2, c = 2 * Math.PI * r;
  var offset = c * (1 - progress);
  var isWork = isWorkMode();
  var color = isWork ? 'var(--accent)' : 'var(--green)';
  var labelMap = { work: '集中タイム', short: '小休憩', long: '長休憩', custom_work: 'カスタム集中', custom_break: 'カスタム休憩' };
  var label = labelMap[state.timerMode] || '集中タイム';
  var mins = String(Math.floor(state.timeLeft / 60)).padStart(2, '0');
  var secs = String(state.timeLeft % 60).padStart(2, '0');

  var modes = [['work','集中'],['short','小休憩'],['long','長休憩']];
  var modeButtons = modes.map(function(arr) {
    var m = arr[0], l = arr[1];
    var cls = 'timer-mode-btn';
    if (state.timerMode === m) cls += m === 'work' ? ' active-work' : ' active-break';
    return '<button class="' + cls + '" data-timer-mode="' + m + '">' + l + '</button>';
  }).join('');
  var customActive = isCustomMode();
  var customBtn = '<button class="timer-mode-btn' + (customActive ? ' active-custom' : '') + '" data-timer-mode="custom_work">カスタム</button>';

  var customPanel = '';
  if (customActive || state.timerMode === 'custom_work' || state.timerMode === 'custom_break') {
    customPanel = '<div class="custom-settings">' +
      '<div class="custom-settings-title">カスタム時間設定</div>' +
      '<div class="custom-row"><label>集中</label>' +
      '<input type="range" class="custom-slider" id="custom-work-slider" min="15" max="120" step="15" value="' + state.customWork + '">' +
      '<span class="custom-slider-val" id="custom-work-val">' + state.customWork + '分</span></div>' +
      '<div class="custom-row"><label>休憩</label>' +
      '<input type="range" class="custom-slider" id="custom-break-slider" min="5" max="60" step="5" value="' + state.customBreak + '">' +
      '<span class="custom-slider-val" id="custom-break-val">' + state.customBreak + '分</span></div>' +
      '</div>';
  }

  var playClass = state.running ? 'paused' : (isWork ? 'work' : 'break');

  return '<div class="tab-content">' +
    '<div class="timer-modes">' + modeButtons + customBtn + '</div>' +
    customPanel +
    renderActiveTaskBanner() +
    '<div class="timer-ring-wrap"><div class="timer-ring" style="width:' + size + 'px;height:' + size + 'px">' +
    '<svg width="' + size + '" height="' + size + '">' +
    '<circle class="ring-bg" cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + r + '" stroke-width="' + sw + '"/>' +
    '<circle class="ring-progress" cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + r + '" stroke-width="' + sw + '"' +
    ' stroke="' + color + '" stroke-dasharray="' + c + '" stroke-dashoffset="' + offset + '"/>' +
    '</svg>' +
    '<div class="timer-center">' +
    '<div class="timer-label" style="color:' + color + '">' + label + '</div>' +
    '<div class="timer-digits">' + mins + ':' + secs + '</div>' +
    '<div class="timer-sessions">セッション ' + state.sessions + '</div>' +
    '</div></div></div>' +
    '<div class="timer-controls">' +
    '<button class="btn-reset" id="btn-reset">' + icons.reset + '</button>' +
    '<button class="btn-play ' + playClass + '" id="btn-play">' + (state.running ? icons.pause : icons.play) + '</button>' +
    '<div style="width:44px"></div>' +
    '</div>' +
    (state.pomoCount > 0 ? '<div class="pomo-count">今日のポモドーロ: <span>' + state.pomoCount + '</span> 回完了</div>' : '') +
    '<div class="audio-panel"><div class="audio-panel-header"><span>BGM</span></div>' +
    '<div class="bgm-options">' +
    BGM_PATTERNS.map(function(p) {
      var cls = 'bgm-btn ' + (state.bgmPattern === p.id ? (p.id === 'off' ? 'off-active' : 'active') : '');
      return '<button class="' + cls + '" data-bgm="' + p.id + '">' + p.name + '</button>';
    }).join('') +
    '</div><div class="volume-row"><label>音量</label>' +
    '<input type="range" class="volume-slider" id="bgm-volume" min="0" max="100" value="' + Math.round(state.bgmVolume * 100) + '">' +
    '</div></div></div>';
}

function renderTasks() {
  var displayTasks = state.tasks.slice().sort(function(a, b) {
    var pa = typeof a.priority === 'number' ? a.priority : 4;
    var pb = typeof b.priority === 'number' ? b.priority : 4;
    if (pa !== pb) return pa - pb;
    return a.id - b.id;
  });

  var taskCards = displayTasks.map(function(t) {
    var doneCount = t.subs.filter(function(s) { return s.done; }).length;
    var total = t.subs.length;
    var prog = total > 0 ? doneCount / total : 0;
    var complete = total > 0 && doneCount === total;
    var prio = typeof t.priority === 'number' ? t.priority : 4;
    var isActive = state.activeTaskId === t.id;

    var subsHtml = '';
    if (t.open) {
      var subItems = t.subs.map(function(s) {
        return '<div class="subtask" data-task="' + t.id + '" data-sub="' + s.id + '">' +
          '<div class="checkbox ' + (s.done ? 'checked' : '') + '">' + (s.done ? icons.check : '') + '</div>' +
          '<span class="subtask-text ' + (s.done ? 'done' : '') + '">' + esc(s.text) + '</span>' +
          '</div>';
      }).join('');

      subsHtml = '<div class="task-body">' + subItems +
        '<input class="subtask-input" placeholder="サブタスクを追加..." data-task-input="' + t.id + '" value="' + esc(state.newSubtasks[t.id] || '') + '">' +
        '<button class="btn-task-timer-full" data-task-timer="' + t.id + '">' + icons.playSmall + ' このタスクでタイマーをスタート</button>' +
        '<div class="task-actions">' +
        (complete ? '<button class="btn-share" data-share="' + t.id + '">' + icons.share + ' LINEで共有</button>' : '') +
        '<button class="btn-delete" data-delete="' + t.id + '">' + icons.trash + '</button>' +
        '</div></div>';
    }

    return '<div class="task-card ' + (complete ? 'complete' : '') + '">' +
      '<div class="task-header" data-toggle="' + t.id + '">' +
      '<span class="chevron ' + (t.open ? 'open' : '') + '">' + icons.chevron + '</span>' +
      '<div style="flex:1">' +
      '<span class="task-title ' + (complete ? 'done' : '') + '">' + esc(t.title) + '</span>' +
      '<span class="priority-tag priority-' + prio + '">#' + prio + '</span>' +
      (t.routine ? '<span class="routine-tag">ルーティン</span>' : '') +
      (total > 0 ? '<div class="task-progress-bar"><div class="task-progress-fill ' + (complete ? 'done' : 'normal') + '" style="width:' + (prog*100) + '%"></div></div>' : '') +
      '</div>' +
      '<span class="task-count">' + doneCount + '/' + total + '</span>' +
      '<button class="btn-task-play' + (isActive ? ' active-task' : '') + '" data-task-play="' + t.id + '">' + icons.playSmall + '</button>' +
      '</div>' + subsHtml + '</div>';
  }).join('');

  var addHtml = state.addStep === 0
    ? '<button class="btn-add-task" id="btn-show-add">' + icons.plus + ' タスク登録</button>'
    : renderAddTaskStep();

  return '<div class="tab-content">' + taskCards + addHtml + '</div>';
}

  if (state.addStep === 1) {
    return '<div class="add-task-modal">' +
      '<h3>タスク登録 — ステップ 1/3</h3>' +
      '<input class="add-task-input" id="new-task-input" placeholder="タスク名を入力..." value="' + esc(state.newTaskTitle) + '">' +
      '<button class="btn-step-next" id="btn-step-next1">次へ</button>' +
      '<button class="btn-cancel-step" id="btn-cancel-step">キャンセル</button>' +
      '</div>';
  }
  if (state.addStep === 2) {
    return '<div class="add-task-modal">' +
      '<h3>タスク登録 — ステップ 2/3</h3>' +
      '<p>「' + esc(state.newTaskTitle) + '」<br>今日中にやらないとまずいですか？</p>' +
      '<div class="step-btns">' +
      '<button class="btn-step urgent" id="btn-urgent-yes">はい・急ぎ</button>' +
      '<button class="btn-step" id="btn-urgent-no">いや・余裕あり</button>' +
      '</div>' +
      '<button class="btn-cancel-step" id="btn-cancel-step">キャンセル</button>' +
      '</div>';
  }
  if (state.addStep === 3) {
    return '<div class="add-task-modal">' +
      '<h3>タスク登録 — ステップ 3/3</h3>' +
      '<p>これは自分にとって大切なことですか？</p>' +
      '<div class="step-btns">' +
      '<button class="btn-step important" id="btn-important-yes">はい・大切</button>' +
      '<button class="btn-step" id="btn-important-no">そこまでじゃない</button>' +
      '</div>' +
      '<button class="btn-cancel-step" id="btn-cancel-step">キャンセル</button>' +
      '</div>';
  }
  if (state.addStep === 4) {
    var prio = calcPriority(state.addTaskUrgent, state.addTaskImportant);
    return '<div class="add-task-modal">' +
      '<h3>タスク登録 — 確認</h3>' +
      '<div class="result-badge">' +
      '<div class="prio-num" style="color:' + PRIO_COLORS[prio] + '">#' + prio + '</div>' +
      '<div class="prio-label">' + PRIO_LABELS[prio] + '</div>' +
      '</div>' +
      '<p style="text-align:center;margin-bottom:14px">' + esc(state.newTaskTitle) + '</p>' +
      '<button class="btn-confirm-add" id="btn-confirm-add">この優先度で追加</button>' +
      '<button class="btn-cancel-step" id="btn-cancel-step" style="margin-top:8px">キャンセル</button>' +
      '</div>';
  }
  return '';
}

    var total = t.subs.length;
    var prio = typeof t.priority === 'number' ? t.priority : 4;
    return '<div class="picker-task-card' + (state.activeTaskId === t.id ? ' active-pick' : '') + '" data-pick="' + t.id + '">' +
      '<div class="picker-task-info">' +
      '<div class="picker-task-title">' + esc(t.title) + '</div>' +
      '<div class="picker-task-sub"><span class="priority-tag priority-' + prio + '">#' + prio + '</span> ' +
      (total > 0 ? doneCount + '/' + total : 'サブタスクなし') + '</div>' +
      '</div></div>';
  }).join('');

  return '<div class="overlay" id="task-picker-overlay">' +
    '<div class="sheet">' +
    '<h2>タスクを選んで集中</h2>' +
    cards +
    '<button class="btn-picker-add" id="btn-picker-add-task">' + icons.plusSmall + ' 新しいタスクを追加</button>' +
    '<div class="sheet-btns" style="margin-top:12px">' +
    '<button class="btn-sheet-secondary" id="btn-start-no-task">そのまま開始</button>' +
    '</div></div></div>';
}

function renderCompleteModal() {
  var task = state.activeTaskId ? state.tasks.find(function(t) { return t.id === state.activeTaskId; }) : null;
  var name = task ? task.title : '集中セッション';
  return '<div class="overlay" id="complete-overlay">' +
    '<div class="sheet">' +
    '<div class="complete-modal-content">' +
    '<h2>お疲れさまでした！</h2>' +
    '<div class="complete-task-name">' + esc(name) + '</div>' +
    '<p>タスクを完了にしますか？</p>' +
    '<div class="sheet-btns">' +
    '<button class="btn-sheet-secondary" id="btn-keep-going">まだ続ける</button>' +
    '<button class="btn-sheet-primary" id="btn-mark-complete">完了にする</button>' +
    '</div></div></div></div>';
}

function renderPraiseModal() {
  return '<div class="overlay" id="praise-overlay">' +
    '<div class="sheet">' +
    '<div class="complete-modal-content">' +
    '<h2>' + esc(state.praiseMessage) + '</h2>' +
    '<p style="margin-top:8px">今日の集中、お疲れさまでした。</p>' +
    '<div class="sheet-btns">' +
    '<button class="btn-sheet-secondary" id="btn-praise-close">閉じる</button>' +
    '<button class="btn-sheet-primary" id="btn-praise-share" style="background:linear-gradient(135deg,#06C755,#00B548);box-shadow:0 2px 10px rgba(6,199,85,0.3)">LINEで共有する</button>' +
    '</div></div></div></div>';
}

function renderBottomNav() {
  return '<div class="bottom-nav">' +
    '<button class="nav-btn ' + (state.tab === 'timer' ? 'active' : '') + '" data-nav="timer">' + icons.timer + '<span>タイマー</span></button>' +
    '<button class="nav-btn ' + (state.tab === 'tasks' ? 'active' : '') + '" data-nav="tasks">' + icons.task + '<span>タスク</span></button>' +
    '</div>';
}

// ========== Event Binding ==========
function bindEvents() {
  // Nav
  document.querySelectorAll('[data-nav]').forEach(function(el) {
    el.onclick = function() { state.tab = el.dataset.nav; render(); };
  });

  // Timer mode buttons
  document.querySelectorAll('[data-timer-mode]').forEach(function(el) {
    el.onclick = function() {
      stopTimer(); stopBgm();
      var m = el.dataset.timerMode;
      if (m === 'custom_work') {
        state.timerMode = 'custom_work';
        state.timeLeft = getCustomWorkTime();
      } else {
        state.timerMode = m;
        state.timeLeft = m === 'work' ? WORK_TIME : m === 'short' ? SHORT_BREAK : LONG_BREAK;
      }
      state.running = false;
      render();
    };
  });

  // Play/Pause
  var playBtn = document.getElementById('btn-play');
  if (playBtn) playBtn.onclick = function() {
    if (state.running) {
      stopTimer(); stopBgm(); state.running = false; render();
    } else {
      if (isWorkMode() && state.tasks.length > 0 && !state.activeTaskId) {
        state.showTaskPicker = true; render();
      } else {
        state.running = true; startTimer(); startBgm(); render();
      }
    }
  };

  // Reset
  var resetBtn = document.getElementById('btn-reset');
  if (resetBtn) resetBtn.onclick = function() {
    stopTimer(); stopBgm();
    state.running = false; state.timeLeft = getTimerTotal(); render();
  };

  // Task header toggles
  document.querySelectorAll('[data-toggle]').forEach(function(el) {
    el.onclick = function(e) {
      if (e.target.closest('[data-task-play]') || e.target.closest('.btn-task-play')) return;
      var id = parseInt(el.dataset.toggle);
      var task = state.tasks.find(function(t) { return t.id === id; });
      if (task) { task.open = !task.open; render(); }
    };
  });

  // Subtask toggles
  document.querySelectorAll('.subtask').forEach(function(el) {
    el.onclick = function() {
      var tid = parseInt(el.dataset.task), sid = parseInt(el.dataset.sub);
      var task = state.tasks.find(function(t) { return t.id === tid; });
      if (task) {
        var sub = task.subs.find(function(s) { return s.id === sid; });
        if (sub) { sub.done = !sub.done; saveTasks(); render(); }
      }
    };
  });

  // Subtask inputs
  document.querySelectorAll('[data-task-input]').forEach(function(el) {
    var tid = parseInt(el.dataset.taskInput);
    el.oninput = function() { state.newSubtasks[tid] = el.value; };
    el.onkeydown = function(e) {
      if (e.key === 'Enter' && el.value.trim()) {
        var task = state.tasks.find(function(t) { return t.id === tid; });
        if (task) {
          task.subs.push({ id: Date.now(), text: el.value.trim(), done: false });
          state.newSubtasks[tid] = '';
          saveTasks(); render();
        }
      }
    };
  });

  // Share buttons
  document.querySelectorAll('[data-share]').forEach(function(el) {
    el.onclick = function(e) { e.stopPropagation(); shareToLine(); };
  });

  // Delete buttons
  document.querySelectorAll('[data-delete]').forEach(function(el) {
    el.onclick = function(e) {
      e.stopPropagation();
      var delId = parseInt(el.dataset.delete);
      if (state.activeTaskId === delId) state.activeTaskId = null;
      state.tasks = state.tasks.filter(function(t) { return t.id !== delId; });
      saveTasks(); render();
    };
  });

  // Mini play button on task card (header)
  document.querySelectorAll('[data-task-play]').forEach(function(el) {
    el.onclick = function(e) {
      e.stopPropagation();
      var tid = parseInt(el.dataset.taskPlay);
      state.activeTaskId = tid;
      state.tab = 'timer';
      if (!isWorkMode()) { state.timerMode = 'work'; state.timeLeft = WORK_TIME; }
      state.running = true;
      render();
      startTimer(); startBgm();
    };
  });

  // Full timer start button in task body
  document.querySelectorAll('[data-task-timer]').forEach(function(el) {
    el.onclick = function(e) {
      e.stopPropagation();
      var tid = parseInt(el.dataset.taskTimer);
      state.activeTaskId = tid;
      state.tab = 'timer';
      if (!isWorkMode()) { state.timerMode = 'work'; state.timeLeft = WORK_TIME; }
      state.running = true;
      render();
      startTimer(); startBgm();
    };
  });

  // Add task button
  var showAddBtn = document.getElementById('btn-show-add');
  if (showAddBtn) showAddBtn.onclick = function() {
    state.addStep = 1; state.newTaskTitle = '';
    state.addTaskUrgent = null; state.addTaskImportant = null;
    render();
    setTimeout(function() { var i = document.getElementById('new-task-input'); if (i) i.focus(); }, 50);
  };

  // Step 1: name input
  var newInput = document.getElementById('new-task-input');
  if (newInput) {
    newInput.oninput = function() { state.newTaskTitle = newInput.value; };
    newInput.onkeydown = function(e) {
      if (e.key === 'Enter' && newInput.value.trim()) {
        state.newTaskTitle = newInput.value;
        state.addStep = 2; render();
      }
    };
  }
  var step1Btn = document.getElementById('btn-step-next1');
  if (step1Btn) step1Btn.onclick = function() {
    var inp = document.getElementById('new-task-input');
    if (inp) state.newTaskTitle = inp.value;
    if (!state.newTaskTitle.trim()) return;
    state.addStep = 2; render();
  };

  // Step 2: urgent
  var urgentYes = document.getElementById('btn-urgent-yes');
  if (urgentYes) urgentYes.onclick = function() { state.addTaskUrgent = true; state.addStep = 3; render(); };
  var urgentNo = document.getElementById('btn-urgent-no');
  if (urgentNo) urgentNo.onclick = function() { state.addTaskUrgent = false; state.addStep = 3; render(); };

  // Step 3: important
  var importYes = document.getElementById('btn-important-yes');
  if (importYes) importYes.onclick = function() { state.addTaskImportant = true; state.addStep = 4; render(); };
  var importNo = document.getElementById('btn-important-no');
  if (importNo) importNo.onclick = function() { state.addTaskImportant = false; state.addStep = 4; render(); };

  // Step 4: confirm
  var confirmAdd = document.getElementById('btn-confirm-add');
  if (confirmAdd) confirmAdd.onclick = function() { addNewTask(); };

  // Cancel step (multiple elements with same id, query all)
  document.querySelectorAll('#btn-cancel-step').forEach(function(el) {
    el.onclick = function() { state.addStep = 0; state.newTaskTitle = ''; state.timerFromPicker = false; render(); };
  });

  // BGM controls
  document.querySelectorAll('[data-bgm]').forEach(function(el) {
    el.onclick = function() {
      state.bgmPattern = el.dataset.bgm;
      saveBgmPattern();
      if (state.running) startBgm(); else stopBgm();
      render();
    };
  });
  var volSlider = document.getElementById('bgm-volume');
  if (volSlider) volSlider.oninput = function() {
    state.bgmVolume = parseInt(volSlider.value) / 100;
    updateBgmVolume();
  };

  // Custom timer sliders
  var cwSlider = document.getElementById('custom-work-slider');
  if (cwSlider) {
    cwSlider.oninput = function() {
      state.customWork = parseInt(cwSlider.value);
      var v = document.getElementById('custom-work-val');
      if (v) v.textContent = state.customWork + '分';
    };
    cwSlider.onchange = function() {
      state.customWork = parseInt(cwSlider.value);
      saveCustomTimer();
      if (state.timerMode === 'custom_work' && !state.running) { state.timeLeft = getCustomWorkTime(); render(); }
    };
  }
  var cbSlider = document.getElementById('custom-break-slider');
  if (cbSlider) {
    cbSlider.oninput = function() {
      state.customBreak = parseInt(cbSlider.value);
      var v = document.getElementById('custom-break-val');
      if (v) v.textContent = state.customBreak + '分';
    };
    cbSlider.onchange = function() {
      state.customBreak = parseInt(cbSlider.value);
      saveCustomTimer();
      if (state.timerMode === 'custom_break' && !state.running) { state.timeLeft = getCustomBreakTime(); render(); }
    };
  }

  // Task picker overlay
  document.querySelectorAll('[data-pick]').forEach(function(el) {
    el.onclick = function() {
      state.activeTaskId = parseInt(el.dataset.pick);
      state.showTaskPicker = false;
      state.running = true;
      render();
      startTimer(); startBgm();
    };
  });
  var startNoTask = document.getElementById('btn-start-no-task');
  if (startNoTask) startNoTask.onclick = function() {
    state.activeTaskId = null;
    state.showTaskPicker = false;
    state.running = true;
    render();
    startTimer(); startBgm();
  };
  var pickerAddBtn = document.getElementById('btn-picker-add-task');
  if (pickerAddBtn) pickerAddBtn.onclick = function() {
    state.showTaskPicker = false;
    state.timerFromPicker = true;
    state.addStep = 1; state.newTaskTitle = '';
    state.addTaskUrgent = null; state.addTaskImportant = null;
    state.tab = 'tasks';
    render();
    setTimeout(function() { var i = document.getElementById('new-task-input'); if (i) i.focus(); }, 50);
  };

  // Complete modal
  var keepGoingBtn = document.getElementById('btn-keep-going');
  if (keepGoingBtn) keepGoingBtn.onclick = function() {
    state.showCompleteModal = false;
    startBreakAfterWork();
    render();
  };
  var markCompleteBtn = document.getElementById('btn-mark-complete');
  if (markCompleteBtn) markCompleteBtn.onclick = function() {
    var msgs = ['お疲れさまでした！', '今日も頑張りましたね！', 'グッジョブ！', 'えらいです！'];
    state.praiseMessage = msgs[Math.floor(Math.random() * msgs.length)];
    state.activeTaskId = null;
    state.showCompleteModal = false;
    state.showPraiseModal = true;
    render();
  };

  // Praise modal
  var praiseClose = document.getElementById('btn-praise-close');
  if (praiseClose) praiseClose.onclick = function() {
    state.showPraiseModal = false;
    state.praiseMessage = '';
    startBreakAfterWork();
    render();
  };
  var praiseShare = document.getElementById('btn-praise-share');
  if (praiseShare) praiseShare.onclick = function() {
    shareToLine();
    state.showPraiseModal = false;
    state.praiseMessage = '';
    startBreakAfterWork();
    render();
  };
}

function addNewTask() {
  if (!state.newTaskTitle.trim()) return;
  var prio = calcPriority(state.addTaskUrgent, state.addTaskImportant);
  var newTask = { id: Date.now(), title: state.newTaskTitle.trim(), routine: false, open: true, priority: prio, subs: [] };
  state.tasks.push(newTask);
  var newId = newTask.id;
  state.newTaskTitle = '';
  state.addStep = 0;
  state.addTaskUrgent = null;
  state.addTaskImportant = null;
  saveTasks();
  if (state.timerFromPicker) {
    state.timerFromPicker = false;
    state.activeTaskId = newId;
    state.tab = 'timer';
    if (!isWorkMode()) { state.timerMode = 'work'; state.timeLeft = WORK_TIME; }
    state.running = true;
    render();
    startTimer(); startBgm();
  } else {
    render();
  }
}

// ========== Timer Logic ==========
function startBreakAfterWork() {
  if (isCustomMode()) {
    state.timerMode = 'custom_break'; state.timeLeft = getCustomBreakTime();
  } else if (state.sessions % 4 === 0) {
    state.timerMode = 'long'; state.timeLeft = LONG_BREAK;
  } else {
    state.timerMode = 'short'; state.timeLeft = SHORT_BREAK;
  }
  state.running = true;
  startTimer(); startBgm();
}

function startTimer() {
  stopTimer();
  timerInterval = setInterval(function() {
    if (state.timeLeft > 0) {
      state.timeLeft--;
      updateTimerDisplay();
    } else {
      stopTimer();
      if (isWorkMode()) {
        state.sessions++;
        state.pomoCount++;
        playAlarm('work_end');
        stopBgm();
        state.running = false;
        state.showCompleteModal = true;
        render();
      } else {
        playAlarm('break_end');
        stopBgm();
        state.running = false;
        if (state.timerMode === 'custom_break') {
          state.timerMode = 'custom_work'; state.timeLeft = getCustomWorkTime();
        } else {
          state.timerMode = 'work'; state.timeLeft = WORK_TIME;
        }
        render();
      }
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  var mins = String(Math.floor(state.timeLeft / 60)).padStart(2, '0');
  var secs = String(state.timeLeft % 60).padStart(2, '0');
  var digits = document.querySelector('.timer-digits');
  if (digits) digits.textContent = mins + ':' + secs;

  var totalTime = getTimerTotal();
  var progress = 1 - state.timeLeft / totalTime;
  var size = 220, sw = 8;
  var r = (size - sw) / 2, c = 2 * Math.PI * r;
  var ring = document.querySelector('.ring-progress');
  if (ring) ring.setAttribute('stroke-dashoffset', c * (1 - progress));
}

// ========== LINE Share ==========
function shareToLine() {
  // 文言はRoutina側のポップアップで既に表示済みのため、LINEはテキストなしで起動
  var url = 'https://line.me/R/share?text=';
  window.open(url, '_blank');
}

// ========== Init ==========
render();

setInterval(function() {
  var now = new Date();
  var clockEl = document.getElementById('realtime-clock');
  var dateEl = document.getElementById('realtime-date');
  if (clockEl) clockEl.textContent = now.toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  if (dateEl) dateEl.textContent = now.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
}, 1000);

// ========== PWA Service Worker Registration ==========
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      console.log('Routina SW registered:', reg.scope);
    }).catch(function(err) {
      console.log('Routina SW registration failed:', err);
    });
  });
}
</script>

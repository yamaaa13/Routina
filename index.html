<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0F1E">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Routina</title>
<style>
  :root {
    --bg: #0A0F1E;
    --bg2: #111827;
    --card: rgba(30, 41, 59, 0.65);
    --card-solid: #1E293B;
    --accent: #6366F1;
    --accent-light: #818CF8;
    --accent-dim: #4F46E5;
    --green: #34D399;
    --green-dim: #059669;
    --red: #F87171;
    --orange: #FBBF24;
    --text: #F1F5F9;
    --text-dim: #94A3B8;
    --text-muted: #64748B;
    --border: rgba(99, 102, 241, 0.15);
    --border-subtle: rgba(51, 65, 85, 0.5);
    --line-green: #06C755;
    --glow-accent: rgba(99, 102, 241, 0.25);
    --glow-green: rgba(52, 211, 153, 0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 440px; margin: 0 auto; min-height: 100vh;
    min-height: 100dvh; overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 600px 400px at 50% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 80% 60%, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
  }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  input::placeholder { color: var(--text-muted); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.75} }
  @keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes stampPop { 0%{transform:scale(0) rotate(-20deg)} 50%{transform:scale(1.4) rotate(10deg)} 100%{transform:scale(1) rotate(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes glowPulse { 0%,100%{box-shadow:0 0 15px var(--glow-accent)} 50%{box-shadow:0 0 30px var(--glow-accent), 0 0 60px rgba(99,102,241,0.1)} }

  .header {
    padding: 20px 20px 0; display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 {
    font-size: 22px; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(135deg, #818CF8, #C084FC, #818CF8);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }
  .header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.5px; }
  .stamp-badge {
    display: flex; align-items: center; gap: 6px; padding: 6px 14px;
    background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 20px; border: 1px solid var(--border);
    font-size: 14px; font-weight: 600; color: var(--orange);
    box-shadow: 0 2px 10px rgba(251, 191, 36, 0.1);
  }

  .content { padding: 16px 20px 110px; }

  /* Stamp Board */
  .stamp-board {
    background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 20px; padding: 18px 20px;
    border: 1px solid var(--border); margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }
  .stamp-board-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; font-weight: 600; }
  .stamp-board-header .label { color: var(--text-dim); }
  .stamp-board-header .count { color: var(--text-muted); }
  .stamp-board-header .count.complete { color: var(--orange); }
  .stamp-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 6px; justify-items: center;
  }
  .stamp-dot {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid var(--border-subtle); background: rgba(15, 23, 42, 0.6);
    display: flex; align-items: center; justify-content: center;
    transition: all .4s cubic-bezier(.34,1.56,.64,1); transform: scale(.85);
  }
  .stamp-dot.filled {
    border-color: var(--accent-light); background: linear-gradient(135deg, var(--accent), #8B5CF6);
    transform: scale(1);
    box-shadow: 0 0 10px var(--glow-accent);
  }
  .reward-banner {
    margin-top: 14px; padding: 12px 16px; border-radius: 14px;
    background: linear-gradient(135deg, #6366F1, #8B5CF6, #A78BFA);
    text-align: center; font-size: 14px; color: #fff; font-weight: 600;
    animation: pulse 2s infinite;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
  }

  /* Timer */
  .timer-modes { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .timer-mode-btn {
    padding: 7px 18px; border-radius: 20px; border: 1px solid var(--border-subtle);
    background: var(--card); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: var(--text-dim);
    font-size: 13px; font-weight: 600; transition: all .2s;
  }
  .timer-mode-btn.active-work {
    background: linear-gradient(135deg, var(--accent), #7C3AED); color: #fff;
    border-color: transparent; box-shadow: 0 2px 12px var(--glow-accent);
  }
  .timer-mode-btn.active-break {
    background: linear-gradient(135deg, var(--green-dim), #10B981); color: #fff;
    border-color: transparent; box-shadow: 0 2px 12px var(--glow-green);
  }
  .timer-mode-btn.active-custom {
    background: linear-gradient(135deg, #D946EF, #A855F7); color: #fff;
    border-color: transparent; box-shadow: 0 2px 12px rgba(217, 70, 239, 0.25);
  }
  .custom-settings {
    background: var(--card); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
    border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .custom-settings-title { font-size: 12px; color: var(--text-dim); font-weight: 600; margin-bottom: 10px; }
  .custom-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .custom-row:last-child { margin-bottom: 0; }
  .custom-row label { font-size: 13px; color: var(--text-muted); width: 60px; flex-shrink: 0; }
  .custom-input {
    width: 60px; padding: 6px 10px; border-radius: 10px; font-size: 14px;
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    outline: none; text-align: center; font-weight: 600;
  }
  .custom-row span { font-size: 12px; color: var(--text-muted); }

  /* Priority */
  .priority-tag {
    display: inline-block; font-size: 10px; padding: 3px 10px; border-radius: 10px;
    font-weight: 600; margin-left: 6px;
  }
  .priority-high { background: rgba(248,113,113,0.2); color: #F87171; border: 1px solid rgba(248,113,113,0.2); }
  .priority-mid { background: rgba(251,191,36,0.2); color: #FBBF24; border: 1px solid rgba(251,191,36,0.2); }
  .priority-low { background: rgba(52,211,153,0.2); color: #34D399; border: 1px solid rgba(52,211,153,0.2); }
  .priority-select {
    padding: 6px 10px; border-radius: 10px; font-size: 13px;
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    outline: none; margin-top: 8px; width: 100%;
  }
  .sort-btn {
    padding: 5px 12px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card); color: var(--text-dim); font-size: 11px; font-weight: 600;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    margin-bottom: 10px; transition: all .2s;
  }
  .sort-btn.active-sort {
    background: linear-gradient(135deg, var(--accent), #7C3AED); color: #fff;
    border-color: transparent;
  }

  .timer-ring-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
  .timer-ring { position: relative; filter: drop-shadow(0 0 20px var(--glow-accent)); }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring .ring-bg { fill: none; stroke: rgba(51, 65, 85, 0.4); }
  .timer-ring .ring-progress { fill: none; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
  .timer-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .timer-label { font-size: 13px; font-weight: 700; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
  .timer-digits { font-size: 48px; font-weight: 800; letter-spacing: 3px; font-variant-numeric: tabular-nums; }
  .timer-sessions { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .timer-controls { display: flex; gap: 16px; align-items: center; justify-content: center; }
  .btn-reset {
    width: 46px; height: 46px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: var(--text-dim); display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .btn-reset:hover { border-color: var(--text-muted); }
  .btn-play {
    width: 68px; height: 68px; border-radius: 50%; border: none;
    color: #fff; display: flex; align-items: center; justify-content: center;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
  }
  .btn-play:active { transform: scale(0.92); }
  .btn-play.work {
    background: linear-gradient(135deg, var(--accent), #7C3AED);
    box-shadow: 0 4px 24px var(--glow-accent);
    animation: glowPulse 3s ease infinite;
  }
  .btn-play.break {
    background: linear-gradient(135deg, #059669, #10B981);
    box-shadow: 0 4px 24px var(--glow-green);
  }
  .btn-play.paused {
    background: linear-gradient(135deg, #DC2626, var(--red));
    box-shadow: 0 4px 24px rgba(248, 113, 113, 0.25);
    animation: none;
  }

  .pomo-count {
    text-align: center; padding: 14px; background: var(--card);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-radius: 14px; border: 1px solid var(--border);
    color: var(--text-dim); font-size: 13px; margin-top: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .pomo-count span { color: var(--accent-light); font-weight: 700; }

  /* Tasks */
  .task-card {
    background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 18px; overflow: hidden;
    border: 1px solid var(--border); margin-bottom: 12px;
    transition: all .3s; box-shadow: 0 2px 16px rgba(0,0,0,0.15);
  }
  .task-card.complete { border-color: var(--green-dim); box-shadow: 0 2px 16px var(--glow-green); }
  .task-header {
    padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
  }
  .chevron { transition: transform .2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(90deg); }
  .task-title { font-size: 15px; font-weight: 600; }
  .task-title.done { color: var(--green); text-decoration: line-through; }
  .routine-tag {
    display: inline-block; font-size: 10px; padding: 3px 10px; border-radius: 10px;
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
    color: var(--accent-light); margin-left: 8px; font-weight: 600;
    border: 1px solid rgba(99,102,241,0.15);
  }
  .task-progress-bar {
    margin-top: 6px; height: 3px; border-radius: 2px;
    background: rgba(51, 65, 85, 0.4); overflow: hidden;
  }
  .task-progress-fill {
    height: 100%; border-radius: 2px; transition: width .3s ease;
  }
  .task-progress-fill.normal { background: linear-gradient(90deg, var(--accent), #8B5CF6); }
  .task-progress-fill.done { background: linear-gradient(90deg, var(--green-dim), var(--green)); }
  .task-count { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }

  .task-body { padding: 0 16px 14px; }
  .subtask {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-top: 1px solid #33415520; cursor: pointer;
  }
  .checkbox {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
    border: 2px solid var(--text-muted); display: flex;
    align-items: center; justify-content: center;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
  }
  .checkbox.checked {
    border-color: var(--green);
    background: linear-gradient(135deg, var(--green-dim), var(--green));
    box-shadow: 0 0 8px var(--glow-green);
  }
  .subtask-text { font-size: 14px; transition: all .2s; }
  .subtask-text.done { color: var(--text-muted); text-decoration: line-through; }

  .subtask-input {
    width: 100%; padding: 8px 12px; border-radius: 10px; font-size: 13px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); outline: none; margin-top: 8px;
  }

  .task-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
  .btn-share {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #06C755, #00B548); color: #fff;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 2px 16px rgba(6, 199, 85, 0.3);
    transition: all .2s;
  }
  .btn-share:active { transform: scale(0.95); }
  .btn-delete {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-size: 13px;
  }
  .btn-add-task {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px; border-radius: 16px; width: 100%;
    border: 1px dashed var(--border); background: transparent;
    color: var(--text-muted); font-size: 14px;
  }
  .add-task-form {
    background: var(--card); border-radius: 16px; padding: 16px;
    border: 1px solid var(--border);
  }
  .add-task-input {
    width: 100%; padding: 10px 14px; border-radius: 10px; font-size: 14px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); outline: none;
  }
  .add-task-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
  .btn-cancel {
    padding: 8px 16px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); font-size: 13px;
  }
  .btn-confirm {
    padding: 8px 16px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--accent), #7C3AED); color: #fff;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 2px 10px var(--glow-accent);
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 440px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 max(20px, env(safe-area-inset-bottom)); z-index: 50;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 0; background: transparent; border: none;
    color: var(--text-muted); font-size: 11px; font-weight: 600;
    transition: all .2s;
  }
  .nav-btn.active { color: var(--accent-light); filter: drop-shadow(0 0 6px var(--glow-accent)); }

  /* Overlays */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #06C755, #00B548); color: #fff; padding: 12px 28px;
    border-radius: 24px; font-size: 14px; font-weight: 600; z-index: 100;
    animation: slideUp .3s ease; box-shadow: 0 4px 24px rgba(6, 199, 85, 0.35);
    pointer-events: none; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .stamp-anim {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 100; font-size: 64px;
    animation: stampPop .6s ease;
  }
  .tab-content { animation: slideUp .3s ease; }

  /* Real-time clock */
  .clock-bar {
    text-align: center; padding: 14px 20px 0;
  }
  .clock-time {
    font-size: 44px; font-weight: 800; letter-spacing: 3px;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(180deg, #F1F5F9 30%, #94A3B8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .clock-date {
    font-size: 14px; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.5px;
  }

  /* Audio Controls */
  .audio-panel {
    background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 18px; padding: 16px 18px;
    border: 1px solid var(--border); margin-top: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.15);
  }
  .audio-panel-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .audio-panel-header span { font-size: 13px; font-weight: 600; color: var(--text-dim); }
  .bgm-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .bgm-btn {
    padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim);
    font-size: 12px; font-weight: 600; transition: all .2s;
  }
  .bgm-btn.active {
    background: linear-gradient(135deg, var(--accent), #7C3AED);
    border-color: transparent; color: #fff;
    box-shadow: 0 2px 10px var(--glow-accent);
  }
  .bgm-btn.off-active { background: var(--card); border-color: var(--text-muted); color: var(--text); }
  .volume-row {
    display: flex; align-items: center; gap: 10px; margin-top: 10px;
  }
  .volume-row label { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .volume-slider {
    -webkit-appearance: none; appearance: none; flex: 1; height: 4px;
    border-radius: 2px; background: var(--border); outline: none;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: linear-gradient(135deg, var(--accent-light), var(--accent));
    cursor: pointer; box-shadow: 0 0 8px var(--glow-accent);
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ========== State ==========
const WORK_TIME = 25 * 60, SHORT_BREAK = 5 * 60, LONG_BREAK = 15 * 60, STAMPS_GOAL = 10;
let state = {
  tab: 'timer',
  // timer
  timerMode: 'work', timeLeft: WORK_TIME, running: false, sessions: 0, pomoCount: 0,
  // stamps
  stamps: loadStamps(),
  lastStampDate: loadLastStampDate(),
  // tasks
  tasks: loadTasks(),
  showAddTask: false, newTaskTitle: '',
  newSubtasks: {},
  // custom timer
  customWork: loadCustomTimer('work', 30),
  customBreak: loadCustomTimer('break', 10),
  // task sort
  sortByPriority: false,
  // audio
  bgmPattern: loadBgmPattern(),
  bgmVolume: 0.3,
  // ui
  showToast: false, showStampAnim: false,
};
let timerInterval = null;
let audioCtx = null;
let bgmAudio = null;
const FADE_DURATION = 3; // seconds for fade in/out

const BGM_PATTERNS = [
  { id: 'off', name: 'OFF', file: null },
  { id: 'bgm1', name: 'BGM 1', file: 'bgm1.mp3' },
  { id: 'bgm2', name: 'BGM 2', file: 'bgm2.mp3' },
  { id: 'bgm3', name: 'BGM 3', file: 'bgm3.mp3' },
];

function loadBgmPattern() {
  try { return localStorage.getItem('rt_bgm') || 'off'; } catch { return 'off'; }
}
function saveBgmPattern() {
  try { localStorage.setItem('rt_bgm', state.bgmPattern); } catch {}
}

function loadCustomTimer(type, def) {
  try { return parseInt(localStorage.getItem('rt_custom_' + type)) || def; } catch { return def; }
}
function saveCustomTimer() {
  try { localStorage.setItem('rt_custom_work', state.customWork); localStorage.setItem('rt_custom_break', state.customBreak); } catch {}
}
function getCustomWorkTime() { return state.customWork * 60; }
function getCustomBreakTime() { return state.customBreak * 60; }
function getTimerTotal() {
  if (state.timerMode === 'work') return WORK_TIME;
  if (state.timerMode === 'short') return SHORT_BREAK;
  if (state.timerMode === 'long') return LONG_BREAK;
  if (state.timerMode === 'custom_work') return getCustomWorkTime();
  if (state.timerMode === 'custom_break') return getCustomBreakTime();
  return WORK_TIME;
}
function isCustomMode() { return state.timerMode === 'custom_work' || state.timerMode === 'custom_break'; }
function isWorkMode() { return state.timerMode === 'work' || state.timerMode === 'custom_work'; }

const PRIORITY_ORDER = { high: 0, mid: 1, low: 2, none: 3 };
const PRIORITY_LABELS = { high: '高', mid: '中', low: '低' };

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ========== BGM Engine (MP3 with crossfade loop) ==========
function stopBgm() {
  if (bgmAudio) {
    const audio = bgmAudio;
    // Fade out
    const startVol = audio.volume;
    const fadeSteps = 30;
    const fadeInterval = (FADE_DURATION * 1000) / fadeSteps;
    let step = 0;
    const fade = setInterval(() => {
      step++;
      audio.volume = Math.max(0, startVol * (1 - step / fadeSteps));
      if (step >= fadeSteps) {
        clearInterval(fade);
        audio.pause();
        audio.currentTime = 0;
      }
    }, fadeInterval);
    bgmAudio = null;
  }
}

function startBgm() {
  // Stop any existing BGM first (immediate)
  if (bgmAudio) {
    bgmAudio.pause();
    bgmAudio.currentTime = 0;
    bgmAudio = null;
  }
  if (state.bgmPattern === 'off') return;

  const pattern = BGM_PATTERNS.find(p => p.id === state.bgmPattern);
  if (!pattern || !pattern.file) return;

  const audio = new Audio(pattern.file);
  audio.volume = 0;
  audio.loop = false; // We handle looping manually for crossfade
  bgmAudio = audio;

  // Crossfade loop: when nearing the end, fade out and restart with fade in
  audio.addEventListener('timeupdate', function() {
    if (!audio.duration) return;
    const timeLeft = audio.duration - audio.currentTime;
    // Start fade out when FADE_DURATION seconds remain
    if (timeLeft <= FADE_DURATION && timeLeft > 0) {
      audio.volume = Math.max(0, (timeLeft / FADE_DURATION) * state.bgmVolume);
    }
  });

  audio.addEventListener('ended', function() {
    if (bgmAudio === audio && state.running) {
      // Restart with fade in
      audio.currentTime = 0;
      audio.volume = 0;
      audio.play().catch(() => {});
      fadeInBgm(audio);
    }
  });

  audio.play().then(() => {
    fadeInBgm(audio);
  }).catch(() => {});
}

function fadeInBgm(audio) {
  const targetVol = state.bgmVolume;
  const fadeSteps = 30;
  const fadeInterval = (FADE_DURATION * 1000) / fadeSteps;
  let step = 0;
  const fade = setInterval(() => {
    step++;
    if (audio !== bgmAudio) { clearInterval(fade); return; }
    audio.volume = Math.min(targetVol, targetVol * (step / fadeSteps));
    if (step >= fadeSteps) clearInterval(fade);
  }, fadeInterval);
}

function updateBgmVolume() {
  if (bgmAudio && bgmAudio.duration) {
    const timeLeft = bgmAudio.duration - bgmAudio.currentTime;
    // Only update if not in fade-out zone
    if (timeLeft > FADE_DURATION) {
      bgmAudio.volume = state.bgmVolume;
    }
  }
}

// ========== Alarm Sound ==========
function playAlarm(type) {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  if (type === 'work_end') {
    // Gentle chime - work session done, break starting
    [523.3, 659.3, 784.0].forEach((freq, i) => {
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.3, t + i * 0.15);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.8);
      o.connect(g).connect(ctx.destination);
      o.start(t + i * 0.15); o.stop(t + i * 0.15 + 0.8);
    });
  } else if (type === 'break_end') {
    // Upbeat ascending tone - break over, back to work
    [392.0, 440.0, 523.3, 659.3].forEach((freq, i) => {
      const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.25, t + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.5);
      o.connect(g).connect(ctx.destination);
      o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.5);
    });
  }
}

// ========== Render ==========
function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderHeader()}
    <div class="content">
      ${renderStampBoard()}
      ${state.tab === 'timer' ? renderTimer() + renderTasks() : renderTasks()}
    </div>
    ${renderBottomNav()}
    ${state.showToast ? '<div class="toast">スタンプ獲得！ +1 ⭐</div>' : ''}
    ${state.showStampAnim ? '<div class="stamp-anim">⭐</div>' : ''}
  `;
  bindEvents();
}

function renderHeader() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const dateStr = now.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  return `<div class="header">
    <div><h1>Routina</h1><p>あなたのリズムをつくる</p></div>
    <div class="stamp-badge">${icons.star} ${state.stamps}</div>
  </div>

    <div class="clock-time" id="realtime-clock">${timeStr}</div>
    <div class="clock-date" id="realtime-date">${dateStr}</div>
  </div>`;
}

function renderStampBoard() {
  const cur = state.stamps % STAMPS_GOAL;
  const complete = cur === 0 && state.stamps > 0;
  const displayCount = complete ? STAMPS_GOAL : cur;
  let dots = '';
  for (let i = 0; i < STAMPS_GOAL; i++) {
    dots += `<div class="stamp-dot ${i < displayCount ? 'filled' : ''}">${i < displayCount ? icons.star : ''}</div>`;
  }
  return `<div class="stamp-board">
    <div class="stamp-board-header">
      <span class="label">スタンプ</span>
      <span class="count ${complete ? 'complete' : ''}">${complete ? 'ごほうびゲット！' : displayCount + ' / ' + STAMPS_GOAL}</span>
    </div>
    <div class="stamp-grid">${dots}</div>
    ${complete ? '<div class="reward-banner">おめでとう！自分へのごほうびを楽しんでね</div>' : ''}
  </div>`;
}

function renderTimer() {
  const totalTime = getTimerTotal();
  const progress = 1 - state.timeLeft / totalTime;
  const size = 220, sw = 8;
  const r = (size - sw) / 2, c = 2 * Math.PI * r;
  const offset = c * (1 - progress);
  const isWork = isWorkMode();
  const color = isWork ? 'var(--accent)' : 'var(--green)';
  const labelMap = { work: '集中タイム', short: '小休憩', long: '長休憩', custom_work: 'カスタム集中', custom_break: 'カスタム休憩' };
  const label = labelMap[state.timerMode] || '集中タイム';
  const mins = String(Math.floor(state.timeLeft / 60)).padStart(2, '0');
  const secs = String(state.timeLeft % 60).padStart(2, '0');

  const modes = [['work','集中'],['short','小休憩'],['long','長休憩']];
  const modeButtons = modes.map(([m,l]) => {
    let cls = 'timer-mode-btn';
    if (state.timerMode === m) cls += m === 'work' ? ' active-work' : ' active-break';
    return `<button class="${cls}" data-timer-mode="${m}">${l}</button>`;
  }).join('');
  const customActive = isCustomMode();
  const customBtn = `<button class="timer-mode-btn${customActive ? ' active-custom' : ''}" data-timer-mode="custom_work">カスタム</button>`;

  const customPanel = customActive || state.timerMode === 'custom_work' || state.timerMode === 'custom_break' ? `
    <div class="custom-settings">
      <div class="custom-settings-title">カスタム時間設定</div>
      <div class="custom-row"><label>集中</label><input type="number" class="custom-input" id="custom-work-input" min="1" max="120" value="${state.customWork}"><span>分</span></div>
      <div class="custom-row"><label>休憩</label><input type="number" class="custom-input" id="custom-break-input" min="1" max="60" value="${state.customBreak}"><span>分</span></div>
    </div>` : '';

  const playClass = state.running ? 'paused' : (isWork ? 'work' : 'break');

  return `<div class="tab-content">
    <div class="timer-modes">${modeButtons}${customBtn}</div>
    ${customPanel}
    <div class="timer-ring-wrap">
      <div class="timer-ring" style="width:${size}px;height:${size}px">
        <svg width="${size}" height="${size}">
          <circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${sw}"/>
          <circle class="ring-progress" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${sw}"
            stroke="${color}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="timer-center">
          <div class="timer-label" style="color:${color}">${label}</div>
          <div class="timer-digits">${mins}:${secs}</div>
          <div class="timer-sessions">セッション ${state.sessions}</div>
        </div>
      </div>
    </div>
    <div class="timer-controls">
      <button class="btn-reset" id="btn-reset">${icons.reset}</button>
      <button class="btn-play ${playClass}" id="btn-play">${state.running ? icons.pause : icons.play}</button>
      <div style="width:44px"></div>
    </div>
    ${state.pomoCount > 0 ? `<div class="pomo-count">今日のポモドーロ: <span>${state.pomoCount}</span> 回完了</div>` : ''}
    <div class="audio-panel">
      <div class="audio-panel-header"><span>BGM</span></div>
      <div class="bgm-options">
        ${BGM_PATTERNS.map(p => `<button class="bgm-btn ${state.bgmPattern === p.id ? (p.id === 'off' ? 'off-active' : 'active') : ''}" data-bgm="${p.id}">${p.name}</button>`).join('')}
      </div>
      <div class="volume-row">
        <label>音量</label>
        <input type="range" class="volume-slider" id="bgm-volume" min="0" max="100" value="${Math.round(state.bgmVolume * 100)}">
      </div>
    </div>
  </div>`;
}

function renderTasks() {
  let displayTasks = [...state.tasks];
  if (state.sortByPriority) {
    displayTasks.sort((a, b) => (PRIORITY_ORDER[a.priority || 'none'] || 3) - (PRIORITY_ORDER[b.priority || 'none'] || 3));
  }
  const taskCards = displayTasks.map((t, idx) => {
    const doneCount = t.subs.filter(s => s.done).length;
    const total = t.subs.length;
    const prog = total > 0 ? doneCount / total : 0;
    const complete = total > 0 && doneCount === total;

    let subsHtml = '';
    if (t.open) {
      const subItems = t.subs.map(s => `
        <div class="subtask" data-task="${t.id}" data-sub="${s.id}">
          <div class="checkbox ${s.done ? 'checked' : ''}">${s.done ? icons.check : ''}</div>
          <span class="subtask-text ${s.done ? 'done' : ''}">${esc(s.text)}</span>
        </div>
      `).join('');

      subsHtml = `<div class="task-body">
        ${subItems}
        <input class="subtask-input" placeholder="サブタスクを追加..." data-task-input="${t.id}"
          value="${esc(state.newSubtasks[t.id] || '')}">
        <div class="task-actions">
          ${complete ? `<button class="btn-share" data-share="${t.id}">${icons.share} LINEで共有${canEarnStampToday() ? ' ⭐' : ''}</button>` : ''}
          <button class="btn-delete" data-delete="${t.id}">${icons.trash}</button>
        </div>
      </div>`;
    }

    return `<div class="task-card ${complete ? 'complete' : ''}">
      <div class="task-header" data-toggle="${t.id}">
        <span class="chevron ${t.open ? 'open' : ''}">${icons.chevron}</span>
        <div style="flex:1">
          <span class="task-title ${complete ? 'done' : ''}">${esc(t.title)}</span>
          ${t.priority && t.priority !== 'none' ? `<span class="priority-tag priority-${t.priority}">${PRIORITY_LABELS[t.priority]}</span>` : ''}
          ${t.routine ? '<span class="routine-tag">ルーティン</span>' : ''}
          ${total > 0 ? `<div class="task-progress-bar"><div class="task-progress-fill ${complete ? 'done' : 'normal'}" style="width:${prog*100}%"></div></div>` : ''}
        </div>
        <span class="task-count">${doneCount}/${total}</span>
      </div>
      ${subsHtml}
    </div>`;
  }).join('');

  const addForm = state.showAddTask ? `
    <div class="add-task-form">
      <input class="add-task-input" id="new-task-input" placeholder="新しいタスク名..." value="${esc(state.newTaskTitle)}">
      <div style="margin:8px 0">
        <select class="priority-select" id="new-task-priority">
          <option value="none">優先度なし</option>
          <option value="high">高</option>
          <option value="mid">中</option>
          <option value="low">低</option>
        </select>
      </div>
      <div class="add-task-actions">
        <button class="btn-cancel" id="btn-cancel-task">キャンセル</button>
        <button class="btn-confirm" id="btn-add-task">追加</button>
      </div>
    </div>
  ` : `<button class="btn-add-task" id="btn-show-add">${icons.plus} タスクを追加</button>`;

  const sortBtn = `<button class="sort-btn" id="btn-sort-priority">${state.sortByPriority ? '★ 優先度順' : '☆ 優先度順'}</button>`;

  return `<div class="tab-content"><div style="text-align:right;margin-bottom:8px">${sortBtn}</div>${taskCards}${addForm}</div>`;
}

function renderBottomNav() {
  return `<div class="bottom-nav">
    <button class="nav-btn ${state.tab === 'timer' ? 'active' : ''}" data-nav="timer">${icons.timer}<span>タイマー</span></button>
    <button class="nav-btn ${state.tab === 'tasks' ? 'active' : ''}" data-nav="tasks">${icons.task}<span>タスク</span></button>
  </div>`;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ========== Event Binding ==========
function bindEvents() {
  // Nav
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.onclick = () => { state.tab = el.dataset.nav; render(); };
  });

  // Timer mode
  document.querySelectorAll('[data-timer-mode]').forEach(el => {
    el.onclick = () => {
      stopTimer(); stopBgm();
      const m = el.dataset.timerMode;
      if (m === 'custom_work') {
        state.timerMode = 'custom_work';
        state.timeLeft = getCustomWorkTime();
      } else {
        state.timerMode = m;
        state.timeLeft = m === 'work' ? WORK_TIME : m === 'short' ? SHORT_BREAK : LONG_BREAK;
      }
      state.running = false;
      render();
    };
  });

  // Play/Pause
  const playBtn = document.getElementById('btn-play');
  if (playBtn) playBtn.onclick = () => {
    if (state.running) { stopTimer(); stopBgm(); state.running = false; }
    else { state.running = true; startTimer(); startBgm(); }
    render();
  };

  // Reset
  const resetBtn = document.getElementById('btn-reset');
  if (resetBtn) resetBtn.onclick = () => {
    stopTimer(); stopBgm();
    state.running = false;
    state.timeLeft = getTimerTotal();
    render();
  };

  // Task toggles
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.onclick = () => {
      const id = parseInt(el.dataset.toggle);
      const task = state.tasks.find(t => t.id === id);
      if (task) { task.open = !task.open; render(); }
    };
  });

  // Subtask toggles
  document.querySelectorAll('.subtask').forEach(el => {
    el.onclick = () => {
      const tid = parseInt(el.dataset.task), sid = parseInt(el.dataset.sub);
      const task = state.tasks.find(t => t.id === tid);
      if (task) {
        const sub = task.subs.find(s => s.id === sid);
        if (sub) { sub.done = !sub.done; saveTasks(); render(); }
      }
    };
  });

  // Subtask inputs
  document.querySelectorAll('[data-task-input]').forEach(el => {
    const tid = parseInt(el.dataset.taskInput);
    el.oninput = () => { state.newSubtasks[tid] = el.value; };
    el.onkeydown = (e) => {
      if (e.key === 'Enter' && el.value.trim()) {
        const task = state.tasks.find(t => t.id === tid);
        if (task) {
          task.subs.push({ id: Date.now(), text: el.value.trim(), done: false });
          state.newSubtasks[tid] = '';
          saveTasks(); render();
        }
      }
    };
  });

  // Share
  document.querySelectorAll('[data-share]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const tid = parseInt(el.dataset.share);
      const task = state.tasks.find(t => t.id === tid);
      if (task) shareToLine(task.title);
    };
  });

  // Delete
  document.querySelectorAll('[data-delete]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      state.tasks = state.tasks.filter(t => t.id !== parseInt(el.dataset.delete));
      saveTasks(); render();
    };
  });

  // Add task
  const showAddBtn = document.getElementById('btn-show-add');
  if (showAddBtn) showAddBtn.onclick = () => { state.showAddTask = true; render(); setTimeout(() => { const i = document.getElementById('new-task-input'); if (i) i.focus(); }, 50); };

  const cancelBtn = document.getElementById('btn-cancel-task');
  if (cancelBtn) cancelBtn.onclick = () => { state.showAddTask = false; state.newTaskTitle = ''; render(); };

  const newInput = document.getElementById('new-task-input');
  if (newInput) {
    newInput.oninput = () => { state.newTaskTitle = newInput.value; };
    newInput.onkeydown = (e) => { if (e.key === 'Enter') addNewTask(); };
  }

  const addBtn = document.getElementById('btn-add-task');
  if (addBtn) addBtn.onclick = addNewTask;

  // BGM controls
  document.querySelectorAll('[data-bgm]').forEach(el => {
    el.onclick = () => {
      state.bgmPattern = el.dataset.bgm;
      saveBgmPattern();
      if (state.running) startBgm();
      else stopBgm();
      render();
    };
  });
  const volSlider = document.getElementById('bgm-volume');
  if (volSlider) {
    volSlider.oninput = () => {
      state.bgmVolume = parseInt(volSlider.value) / 100;
      updateBgmVolume();
    };
  }

  // Custom timer inputs
  const cwInput = document.getElementById('custom-work-input');
  if (cwInput) cwInput.onchange = () => {
    state.customWork = Math.max(1, Math.min(120, parseInt(cwInput.value) || 30));
    saveCustomTimer();
    if (state.timerMode === 'custom_work' && !state.running) { state.timeLeft = getCustomWorkTime(); render(); }
  };
  const cbInput = document.getElementById('custom-break-input');
  if (cbInput) cbInput.onchange = () => {
    state.customBreak = Math.max(1, Math.min(60, parseInt(cbInput.value) || 10));
    saveCustomTimer();
    if (state.timerMode === 'custom_break' && !state.running) { state.timeLeft = getCustomBreakTime(); render(); }
  };

  // Sort by priority
  const sortBtn = document.getElementById('btn-sort-priority');
  if (sortBtn) sortBtn.onclick = () => { state.sortByPriority = !state.sortByPriority; render(); };
}

function addNewTask() {
  if (!state.newTaskTitle.trim()) return;
  const prioEl = document.getElementById('new-task-priority');
  const priority = prioEl ? prioEl.value : 'none';
  state.tasks.push({ id: Date.now(), title: state.newTaskTitle.trim(), routine: false, open: true, priority: priority, subs: [] });
  state.newTaskTitle = '';
  state.showAddTask = false;
  saveTasks(); render();
}

// ========== Timer Logic ==========
function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    if (state.timeLeft > 0) {
      state.timeLeft--;
      updateTimerDisplay();
    } else {
      stopTimer();
      if (isWorkMode()) {
        state.sessions++;
        state.pomoCount++;
        if (isCustomMode()) {
          state.timerMode = 'custom_break'; state.timeLeft = getCustomBreakTime();
        } else if (state.sessions % 4 === 0) {
          state.timerMode = 'long'; state.timeLeft = LONG_BREAK;
        } else {
          state.timerMode = 'short'; state.timeLeft = SHORT_BREAK;
        }
        // Auto-start break
        playAlarm('work_end');
        state.running = true;
        render();
        startTimer();
        startBgm();
      } else {
        playAlarm('break_end');
        stopBgm();
        state.running = false;
        if (state.timerMode === 'custom_break') {
          state.timerMode = 'custom_work'; state.timeLeft = getCustomWorkTime();
        } else {
          state.timerMode = 'work'; state.timeLeft = WORK_TIME;
        }
        render();
      }
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  const mins = String(Math.floor(state.timeLeft / 60)).padStart(2, '0');
  const secs = String(state.timeLeft % 60).padStart(2, '0');
  const digits = document.querySelector('.timer-digits');
  if (digits) digits.textContent = `${mins}:${secs}`;

  const totalTime = getTimerTotal();
  const progress = 1 - state.timeLeft / totalTime;
  const size = 220, sw = 8;
  const r = (size - sw) / 2, c = 2 * Math.PI * r;
  const ring = document.querySelector('.ring-progress');
  if (ring) ring.setAttribute('stroke-dashoffset', c * (1 - progress));
}

// ========== LINE Share ==========
function shareToLine(taskTitle) {
  const msg = taskTitle + ' を完了しました！';
  const url = 'https://line.me/R/share?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');

  if (canEarnStampToday()) {
    state.stamps++;
    state.lastStampDate = getTodayStr();
    saveStamps();
    saveLastStampDate(state.lastStampDate);

    state.showStampAnim = true;
    state.showToast = true;
    render();
    setTimeout(() => { state.showStampAnim = false; render(); }, 1500);
    setTimeout(() => { state.showToast = false; render(); }, 3000);
  } else {
    render();
  }
}

// ========== Init ==========
render();

// Real-time clock update (every second, lightweight DOM update)
setInterval(() => {
  const now = new Date();
  const clockEl = document.getElementById('realtime-clock');
  const dateEl = document.getElementById('realtime-date');
  if (clockEl) clockEl.textContent = now.toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  if (dateEl) dateEl.textContent = now.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
}, 1000);

// ========== PWA Service Worker Registration ==========
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('Routina SW registered:', reg.scope);
    }).catch(err => {
      console.log('Routina SW registration failed:', err);
    });
  });
}
</script>
